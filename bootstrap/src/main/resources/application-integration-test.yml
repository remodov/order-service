# Профиль для интеграционных тестов: см. test-strategy
# - PostgreSQL поднимается через @ServiceConnection в BaseIntegrationTest
# - Kafka выключен; @MockitoBean DomainEventPublisher (или своя in-memory подмена)
# - Redis-кэш — none

spring:
  cache:
    type: none
  flyway:
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: dummy:0     # не используется в тестах
    producer:
      bootstrap-servers: dummy:0
    consumer:
      bootstrap-servers: dummy:0
      group-id: order-service-it

# WireMock-стабы для Catalog/Payment поднимаются в BaseIntegrationTest
clients:
  catalog:
    base-url: http://wiremock-catalog/   # будет переопределён через @DynamicPropertySource
  payment:
    base-url: http://wiremock-payment/

# Шедулеры в тестах не запускаем — вызываем job-ы вручную
order-service:
  outbox:
    relay-fixed-delay: 86400000   # 1 day
  expire-unpaid:
    fixed-delay: 86400000

logging:
  level:
    org.springframework: WARN
    ru.vikulinva.orderservice: DEBUG
